[DEFAULT]

; ----- Impostazioni hardware necessarie -----
; Numero di batterie fisiche (2 Eco-Worthy)
NR_OF_BATTERIES = 2
; Una batteria 12V LFP ha sempre 4 celle
NR_OF_CELLS_PER_BATTERY = 4

; Numero di regolatori solari MPPT nel sistema
NR_OF_MPPTS = 1


; ----- DBus settings -----
BATTERY_SERVICE_NAME = com.victronenergy.battery
DCLOAD_SERVICE_NAME = com.victronenergy.dcload
BATTERY_PRODUCT_NAME_PATH = /ProductName
BATTERY_PRODUCT_NAME = SerialBattery
BATTERY_INSTANCE_NAME_PATH = /Serial
MULTI_KEYWORD = com.victronenergy.vebus
MPPT_KEYWORD = com.victronenergy.solarcharger
SMARTSHUNT_NAME_KEYWORD = SmartShunt
SMARTSHUNT_INSTANCE_NAME_PATH = /CustomName

BATTERY_PRODUCT_NAME = SP04S034L4S200A

BLE_SEARCH_TRIALS = 60
SEARCH_TRIALS = 45
READ_TRIALS = 10

; ----- Opzioni -----
; Lascio True perché la misurazione Victron (SmartShunt/Inverter) è più precisa dei BMS economici
CURRENT_FROM_VICTRON = True
USE_SMARTSHUNTS = False
INVERT_SMARTSHUNTS = False
IGNORE_SMARTSHUNT_ABSENCE = False

; Calcolo SoC interno al driver (molto utile se il BMS Eco-Worthy non è preciso)
OWN_SOC = True
ZERO_SOC = False

; Valori di reset SoC per LiFePO4
MAX_CELL_VOLTAGE_SOC_FULL = 3.45
MIN_CELL_VOLTAGE_SOC_EMPTY = 2.90
CHARGE_SAVE_PRECISION = 0.0025


; ----- Parametri di Carica/Scarica (Specifici per LFP) -----
OWN_CHARGE_PARAMETERS = True

; Voltaggio di bilanciamento (3.50V è l'ideale per attivare il bilanciamento del BMS)
BALANCING_VOLTAGE = 3.50
BALANCING_REPETITION = 10

; Voltaggio di carica per cella suddiviso per mesi (conservativo per far durare le batterie)
; 3.50V x 4 = 14.0V (carica piena ma sicura)
CHARGE_VOLTAGE_LIST =
    3.55,  ; Gennaio
    3.50,  ; Febbraio
    3.50,  ; Marzo
    3.45,  ; Aprile
    3.40,  ; Maggio
    3.40,  ; Giugno
    3.40,  ; Luglio
    3.40,  ; Agosto
    3.45,  ; Settembre
    3.50,  ; Ottobre
    3.50,  ; Novembre
    3.55   ; Dicembre

; Protezione cella singola
MAX_CELL_VOLTAGE = 3.60
MIN_CELL_VOLTAGE = 2.85
MIN_CELL_HYSTERESIS = 0.1
CELL_DIFF_MAX = 0.025
BATTERY_EFFICIENCY = 0.98

; --- LIMITI DI CORRENTE ---
; Ogni batteria Eco-Worthy 280Ah ha solitamente un BMS da 150A o 200A.
; In parallelo avresti 400A, ma per sicurezza e salute delle celle limitiamo a:
MAX_CHARGE_CURRENT = 150
MAX_DISCHARGE_CURRENT = 250

; Limitazione automatica basata sui voltaggi sopra impostati
CELL_CHARGE_LIMITING_VOLTAGE = 
CELL_CHARGE_LIMITED_CURRENT = 0.2, 1, 1, 0.1, 0
CELL_DISCHARGE_LIMITING_VOLTAGE = 
CELL_DISCHARGE_LIMITED_CURRENT = 0, 0.05, 1

KEEP_MAX_CVL = False

; --------- Log e report ---------
; Impostato a 1 per vedere i voltaggi delle singole celle sulla Remote Console
SEND_CELL_VOLTAGES = 1
LOGGING = INFO
LOG_PERIOD = 300